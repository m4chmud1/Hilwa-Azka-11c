<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimoni Pembeli</title>

<body>

<nav>
    <a href="index.html">Beranda</a>
    <a href="produk.html">Produk</a>
    <a href="bedah-buku.html">Bedah Buku</a>
    <a href="testimoni.html">Testimoni</a>
    <a href="tampil-testimoni.html">Testimoni Pembeli</a>
    <a href="kontak.html">Kontak</a>
    <a href="event.html">Event Buku</a>
</nav>

<style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        section {
            padding: 20px;
        }

        .card {
            background-color: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>


<main class="formulir">
    <h2>Testimoni Pembeli:</h2>

    <div id="daftarTestimoni"></div>

    <button id="hapusSemua">Hapus Semua Testimoni</button>
</main>

<footer>
    <p style="text-align:center;">&copy; 2026 Arutala Sadhana</p>
</footer>

<script>
const container =document.getElementById("daftarTestimoni");

let testimoniList =JSON.parse(localStorage.getItem("testimoniList")) || [];

if (testimoniList.length === 0) {
    container.innerHTML = "<p>Belum ada testimoni.</p>";
} else {
    testimoniList.forEach((t, i) => {
        const el = document.createElement('div');
        el.className = 'testimoni-box';

        el.innerHTML = `
            <p><strong>Nama :</strong> ${t.nama}</p>
            <p><strong>Asal :</strong> ${t.asal}</p>
            <p><strong>Email :</strong> ${t.email}</p>
            <p><strong>Judul Buku :</strong> ${t.judul}</p>
            <p><strong>Testimoni :</strong> ${t.pesan}</p>
            <p><strong>Rating :</strong> ${t.rating}</p>
        `;

        container.appendChild(el);
    });
}

document.getElementById("hapusSemua").addEventListener("click", function() {
    const konfirmasi = confirm("Yakin ingin menghapus semua testimoni?");
    if (konfirmasi) {
        localStorage.removeItem("testimoniList");
        location.reload();
    }
});
</script>

</body>
</html>
